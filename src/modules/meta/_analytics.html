<!-- 計測タグ：初回ユーザー操作 or 4秒後まで遅延読み込み（Total Blocking Time 削減のため） -->
<script>
  (function () {
    var loaded = false;
    function loadAll() {
      if (loaded) return;
      loaded = true;

      // User Heat Tag
      (function (add, cla) {
        window["UserHeatTag"] = cla;
        window[cla] = window[cla] || function () { (window[cla].q = window[cla].q || []).push(arguments); };
        window[cla].l = 1 * new Date();
        var ul = document.createElement("script");
        var tag = document.getElementsByTagName("script")[0];
        ul.async = 1;
        ul.src = add;
        tag.parentNode.insertBefore(ul, tag);
      })("//uh.nakanohito.jp/uhj2/uh.js", "_uhtracker");
      _uhtracker({ id: "uhR7AfnJKz" });

      // Google Tag Manager（PCDDS7MV / 58D75LLL）
      window.dataLayer = window.dataLayer || [];
      ["GTM-PCDDS7MV", "GTM-58D75LLL"].forEach(function (i) {
        window.dataLayer.push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var j = document.createElement("script");
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i;
        document.head.appendChild(j);
      });
    }

    var evts = ["scroll", "pointerdown", "keydown", "touchstart", "mousemove"];
    function trigger() {
      evts.forEach(function (e) { removeEventListener(e, trigger, { passive: true }); });
      loadAll();
    }
    evts.forEach(function (e) { addEventListener(e, trigger, { passive: true }); });
    setTimeout(loadAll, 4000); // 無操作ユーザーでも確実に計測（フォールバック）
  })();
</script>
