<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" href="/images/favicon.ico"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-58D75LLL');</script>
    <!-- End Google Tag Manager -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles/main.scss">
    <script src="https://kit.fontawesome.com/6f1db9376e.js" crossorigin="anonymous"></script>

    <title><%= title %></title>
    <meta name="description" content="<%= disc %>">

    <meta property="og:title" content="<%= title %>">
    <meta property="og:type" content="website">
    <meta property="og:url" content="<%= common.domain %>">
    <% 
    const ogpImg = theme === "theme-siid" ? "/images/ogp-siid.png" : "/images/ogp.png";
    %>
    <meta property="og:image" content="<%= ogpImg %>">

    <!-- オプション -->
    <meta property="og:description" content="<%= disc %>">
    <meta property="og:site_name" content="<%= common.siteName %>">
    <meta property="og:locale" content="ja_JP">

    <!-- Twitterカード -->
    <meta name="twitter:card" content="summary_large_image"> <!-- 画像を大きく表示したい場合 -->
    <meta name="twitter:site" content="@seito_horiguchi"> <!-- サイトのTwitterアカウント -->
    <meta name="twitter:title" content="<%= title %>">
    <meta name="twitter:description" content="<%= disc %>">
    <meta name="twitter:image" content="<%= ogpImg %>">
    <meta name="twitter:image:alt" content="<%= title %>">

    <%- include('../modules/meta/_analytics.html') %>
</head>
<body class="<%= theme %>">
    
<%- include('../modules/meta/_analytics_in-body.html') %>
